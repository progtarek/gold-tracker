name: Gold Price Tracker

on:
  schedule:
    - cron: "0 */1 * * *" # Every 1 hour (720 requests/month, under 24,000 free tier limit)
  workflow_dispatch: # Allow manual trigger

jobs:
  gold_check:
    runs-on: ubuntu-latest
    # Don't fail the workflow if API has issues - better to see partial results
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run gold price check
        env:
          # Required: Get free API key at https://twelvedata.com/pricing
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          # Required: Get from @BotFather and @userinfobot on Telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Optional: Alert thresholds (set to 0 to disable)
          ALERT_PRICE_ABOVE: ${{ secrets.ALERT_PRICE_ABOVE }}
          ALERT_PRICE_BELOW: ${{ secrets.ALERT_PRICE_BELOW }}
          PYTHONUNBUFFERED: "1"
        run: python run_once.py
