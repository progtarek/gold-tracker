name: Gold Price Tracker

on:
  schedule:
    - cron: "*/60 * * * *" # Every 60 minutes
  workflow_dispatch: # Allow manual trigger

jobs:
  gold_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run gold price check
        env:
          FCS_API_KEY: ${{ secrets.FCS_API_KEY }}
          FCS_API_PUBLIC_KEY: ${{ secrets.FCS_API_PUBLIC_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ALERT_PRICE_ABOVE: ${{ secrets.ALERT_PRICE_ABOVE }}
          ALERT_PRICE_BELOW: ${{ secrets.ALERT_PRICE_BELOW }}
        run: python run_once.py
